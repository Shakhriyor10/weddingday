<script>
(function () {
    const form = document.getElementById('wedding-comment-form');
    if (!form) return;

    const list = document.getElementById('comments-list');

    function createCommentCard(comment) {
        const card = document.createElement('article');
        card.className = 'comment-card comment-card-new';

        const avatar = document.createElement('div');
        avatar.className = 'comment-avatar';
        avatar.setAttribute('aria-hidden', 'true');
        avatar.textContent = (comment.name || 'M').trim().charAt(0).toUpperCase() || 'M';

        const body = document.createElement('div');
        body.className = 'comment-card-body';
        const heading = document.createElement('h4');
        heading.textContent = comment.name || 'Mehmon';
        if (comment.table) {
            const table = document.createElement('small');
            table.textContent = ' · stol ' + comment.table;
            heading.appendChild(table);
        }

        const text = document.createElement('p');
        text.textContent = comment.text;
        const time = document.createElement('time');
        time.textContent = new Intl.DateTimeFormat('ru-RU', {
            day: '2-digit', month: '2-digit', year: 'numeric',
            hour: '2-digit', minute: '2-digit'
        }).format(new Date(comment.date_time)).replace(',', ' ·');

        body.append(heading, text, time);
        card.append(avatar, body);
        return card;
    }

    form.addEventListener('submit', async function (event) {
        event.preventDefault();
        const button = form.querySelector('button[type="submit"]');
        let status = form.querySelector('.comment-success-message');
        if (!status) {
            status = document.createElement('p');
            status.className = 'comment-success-message';
            status.setAttribute('role', 'status');
            form.appendChild(status);
        }

        button.disabled = true;
        status.textContent = 'Izoh saqlanmoqda…';

        try {
            const response = await fetch(form.action, {
                method: 'POST',
                body: new FormData(form),
                headers: {'X-Requested-With': 'XMLHttpRequest'}
            });
            const data = await response.json();
            if (!response.ok) throw new Error(data.message || 'Izohni yuborib bo‘lmadi');

            const empty = document.getElementById('comments-empty');
            if (empty) empty.remove();
            list.prepend(createCommentCard(data.comment));
            form.reset();
            status.textContent = 'Rahmat! Izoh saqlandi ♡';
            window.setTimeout(function () { status.textContent = ''; }, 4000);
        } catch (error) {
            status.textContent = error.message;
        } finally {
            button.disabled = false;
        }
    });
}());
</script>
